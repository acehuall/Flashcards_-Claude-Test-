<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0e14" />
    <title>Offline | Flashcards</title>
    <style>
      :root {
        color-scheme: dark;
        --app-bg: #0f1117;
        --app-bg-alt: #0b0e14;
        --app-surface: #1a2235;
        --app-border: #2a3554;
        --app-primary: #f5f7fa;
        --app-secondary: #98a2b3;
        --app-nav: #4c63d2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background-color: var(--app-bg);
        background-image:
          radial-gradient(1100px circle at 15% -10%, rgb(76 99 210 / 0.22), transparent 54%),
          radial-gradient(900px circle at 85% -20%, rgb(99 102 241 / 0.16), transparent 48%),
          linear-gradient(180deg, var(--app-bg-alt) 0%, var(--app-bg) 38%, var(--app-bg) 100%);
        color: var(--app-primary);
        font-family: Roboto, Inter, system-ui, sans-serif;
      }

      main {
        width: min(100%, 28rem);
        padding: 32px 28px;
        border: 1px solid var(--app-border);
        border-radius: 20px;
        background: rgb(26 34 53 / 0.92);
        box-shadow: 0 20px 50px rgb(0 0 0 / 0.3);
        text-align: center;
      }

      .badge {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: var(--app-nav);
        color: #fff;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: var(--app-secondary);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        padding: 12px 18px;
        border-radius: 999px;
        background: var(--app-nav);
        color: #fff;
        text-decoration: none;
        font-weight: 500;
      }

      a:hover {
        background: #3b52c4;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge" aria-hidden="true">F</div>
      <h1>You're offline</h1>
      <p>Flashcards can still work once the app shell has been cached, but this page appears when the browser cannot reach the app or a route has not been stored yet.</p>
      <a href="/">Try the home screen</a>
    </main>
  </body>
</html>
